<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Gurukul</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #fff1dc, #ffe0c3);
}

.header {
  padding: 15px;
  background: linear-gradient(90deg, #ff9933, #ff6600);
  color: white;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.stars {
  margin-top: 5px;
  font-size: 18px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

img {
  width: 110px;
  border-radius: 15px;
  margin: 10px;
  transition: transform 0.2s;
}

img:active {
  transform: scale(1.2);
}

.question {
  font-size: 20px;
  margin: 10px;
  color: #444;
}

.grid {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.glow {
  box-shadow: 0 0 25px gold;
}

button {
  background: #ff6600;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  🪔 Little Gurukul  
  <div class="stars">⭐ <span id="stars">0</span></div>
</div>

<div class="container">

  <div class="card">
    <div class="question" id="question">Loading...</div>

    <div class="grid" id="gameArea"></div>

    <button onclick="startMusic()">🎵 Play Music</button>
  </div>

</div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<script>

// AI-STYLE IMAGES (You can replace later)
let allCharacters = [
  {name: "Ram", img: "https://i.imgur.com/3QZQZ9y.png"},
  {name: "Hanuman", img: "https://i.imgur.com/2DhmtJ4.png"},
  {name: "Krishna", img: "https://i.imgur.com/5b6pX8L.png"},
  {name: "Shiva", img: "https://i.imgur.com/8RKXAIV.png"}
];

let unlocked = 3;
let stars = 0;
let correctAnswer;

// MUSIC
function startMusic() {
  document.getElementById("bgMusic").play();
}

// VOICE
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speech.rate = 0.9;
  window.speechSynthesis.speak(speech);
}

// SHUFFLE
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// LOAD GAME
function loadGame() {
  let current = allCharacters.slice(0, unlocked);
  let shuffled = shuffle([...current]);

  let random = shuffled[Math.floor(Math.random()*shuffled.length)];
  correctAnswer = random.name;

  document.getElementById("question").innerText = random.name + " ko dhoondo";
  speak(random.name + " ko dhoondo");

  let html = "";
  shuffled.forEach(c => {
    html += `<img src="${c.img}" onclick="check('${c.name}', this)">`;
  });

  document.getElementById("gameArea").innerHTML = html;
}

// CHECK ANSWER
function check(name, el) {
  if(name === correctAnswer) {
    stars++;
    document.getElementById("stars").innerText = stars;

    el.classList.add("glow");

    speak("Shabash!");

    if(stars === 5 && unlocked < allCharacters.length) {
      unlocked++;
      speak("Naya character unlock hua!");
    }

    setTimeout(loadGame, 800);

  } else {
    speak("Dobara try karo");
  }
}

// INIT
loadGame();

</script>

</body>
</html>
