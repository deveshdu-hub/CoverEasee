<!DOCTYPE html>
<html>
<head>
  <title>AddaLive - Real Talk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; }
    input, button { padding:10px; margin:5px; width:80%; }
    #chat { height:300px; overflow:auto; border:1px solid #444; padding:10px; }
  </style>
</head>

<body>

<h2>🔥 AddaLive</h2>

<div id="login">
  <input type="text" id="phone" placeholder="+91XXXXXXXXXX">
  <button onclick="sendOTP()">Send OTP</button>
  <input type="text" id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Room: General Talk</h3>
  <div id="chat"></div>
  <input id="msg" placeholder="Type something...">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let confirmationResult;

  function sendOTP() {
    const phone = document.getElementById('phone').value;
    const appVerifier = new firebase.auth.RecaptchaVerifier('login', {
      size: 'invisible'
    });

    auth.signInWithPhoneNumber(phone, appVerifier)
      .then(res => confirmationResult = res);
  }

  function verifyOTP() {
    const otp = document.getElementById('otp').value;
    confirmationResult.confirm(otp).then(() => {
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='block';
      loadMessages();
    });
  }

  function sendMsg() {
    const text = document.getElementById('msg').value;
    db.collection("messages").add({
      text: text,
      time: Date.now()
    });
    document.getElementById('msg').value='';
  }

  function loadMessages() {
    db.collection("messages").orderBy("time")
      .onSnapshot(snapshot => {
        let chat = "";
        snapshot.forEach(doc => {
          chat += "<p>" + doc.data().text + "</p>";
        });
        document.getElementById('chat').innerHTML = chat;
      });
  }
</script>

</body>
</html>
