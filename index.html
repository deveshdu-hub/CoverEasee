<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Gurukul</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #fff1dc, #ffe0c3);
}

.header {
  padding: 15px;
  background: linear-gradient(90deg, #ff9933, #ff6600);
  color: white;
  font-size: 22px;
  font-weight: bold;
}

.tabs button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #ff6600;
  color: white;
}

.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

img {
  width: 100px;
  margin: 10px;
  border-radius: 15px;
  cursor: pointer;
}

.glow {
  box-shadow: 0 0 20px gold;
}
</style>
</head>

<body>

<div class="header">
  🪔 Little Gurukul ⭐ <span id="stars">0</span>
</div>

<div class="tabs">
  <button onclick="switchMode('god')">Gods</button>
  <button onclick="switchMode('fruit')">Fruits</button>
  <button onclick="switchMode('animal')">Animals</button>
  <button onclick="switchMode('abc')">ABC</button>
</div>

<div class="card">
  <h3 id="question">Loading...</h3>
  <div class="grid" id="gameArea"></div>
</div>

<!-- STORY -->
<div class="card">
  <h3>🎬 Story</h3>
  <p id="storyText">Ram jungle ja rahe the...</p>
  <img id="storyImg" src="https://picsum.photos/200?random=1">
  <br><br>
  <button onclick="nextStory()">Next</button>
</div>

<!-- PUZZLE -->
<div class="card">
  <h3>🧩 Puzzle</h3>
  <div id="puzzleArea"></div>
</div>

<!-- AUDIO -->
<div class="card">
  <h3>🎵 Bhajan</h3>
  <audio controls>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">
  </audio>
</div>

<script>

// DATA (STABLE IMAGES)
let gods = [
  {name:"Ram", img:"https://picsum.photos/100?1"},
  {name:"Hanuman", img:"https://picsum.photos/100?2"},
  {name:"Krishna", img:"https://picsum.photos/100?3"}
];

let fruits = [
  {name:"Apple", hindi:"Seb", img:"https://picsum.photos/100?4"},
  {name:"Banana", hindi:"Kela", img:"https://picsum.photos/100?5"},
  {name:"Mango", hindi:"Aam", img:"https://picsum.photos/100?6"}
];

let animals = [
  {name:"Cow", hindi:"Gai", img:"https://picsum.photos/100?7"},
  {name:"Dog", hindi:"Kutta", img:"https://picsum.photos/100?8"},
  {name:"Lion", hindi:"Sher", img:"https://picsum.photos/100?9"}
];

let abc = [
  {name:"A", word:"Apple", img:"https://picsum.photos/100?10"},
  {name:"B", word:"Ball", img:"https://picsum.photos/100?11"},
  {name:"C", word:"Cat", img:"https://picsum.photos/100?12"}
];

let mode = "god";
let stars = 0;
let correctAnswer;

// VOICE
function speak(text){
  let s = new SpeechSynthesisUtterance(text);
  s.lang="hi-IN";
  speechSynthesis.speak(s);
}

// GAME
function loadGame(){
  let data = {god:gods, fruit:fruits, animal:animals, abc:abc}[mode];

  let shuffled = data.sort(()=>Math.random()-0.5);
  let random = shuffled[Math.floor(Math.random()*shuffled.length)];
  correctAnswer = random.name;

  document.getElementById("question").innerText =
    mode==="abc" ? random.name+" for "+random.word :
    mode==="god" ? random.name+" ko dhoondo" :
    random.hindi+" dhoondo";

  speak(document.getElementById("question").innerText);

  let html="";
  shuffled.forEach(i=>{
    html+=`<img src="${i.img}" onclick="check('${i.name}',this)">`;
  });

  document.getElementById("gameArea").innerHTML=html;
}

function check(name,el){
  if(name===correctAnswer){
    stars++;
    document.getElementById("stars").innerText=stars;
    el.classList.add("glow");
    speak("Shabash");
    setTimeout(loadGame,800);
  } else {
    speak("Try again");
  }
}

// SWITCH
function switchMode(m){
  mode=m;
  loadGame();
}

// STORY
let story=[
  "Ram jungle ja rahe the",
  "Hanuman unse mile",
  "Dono dost ban gaye"
];
let si=0;

function nextStory(){
  si=(si+1)%story.length;
  document.getElementById("storyText").innerText=story[si];
  speak(story[si]);
}

// PUZZLE
let puzzle=["ram","ram","hanuman","hanuman"];
let selected=[];

function loadPuzzle(){
  let html="";
  puzzle.sort(()=>Math.random()-0.5).forEach(p=>{
    html+=`<button onclick="match('${p}')">${p}</button>`;
  });
  document.getElementById("puzzleArea").innerHTML=html;
}

function match(v){
  selected.push(v);
  if(selected.length===2){
    if(selected[0]===selected[1]){
      stars++;
      document.getElementById("stars").innerText=stars;
      speak("Correct match");
    }
    selected=[];
  }
}

// INIT
loadGame();
loadPuzzle();

</script>

</body>
</html>
