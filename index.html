<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Gurukul</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #fff5e6, #ffe0b3);
}

h1 {
  color: #ff6600;
}

.container {
  padding: 15px;
}

.card {
  margin: 15px;
  padding: 20px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

img {
  width: 140px;
  margin: 10px;
  border-radius: 15px;
}

button {
  padding: 10px 15px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #ff6600;
  color: white;
}

.game img {
  width: 100px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🪔 Little Gurukul</h1>

<!-- LEVEL 1 -->
<div class="container">
  <h2>🌼 Level 1: Suno</h2>

  <div class="card">
    <img src="https://i.imgur.com/3QZQZ9y.png">
    <p>Ram</p>
    <button onclick="speak('Yeh Ram hai. Ram bahut acche raja the.')">🔊</button>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/2DhmtJ4.png">
    <p>Hanuman</p>
    <button onclick="speak('Yeh Hanuman hai. Hanuman bahut balwan the.')">🔊</button>
  </div>

  <div class="card">
    <img src="https://i.imgur.com/5b6pX8L.png">
    <p>Krishna</p>
    <button onclick="speak('Yeh Krishna hai. Krishna makkhan khate the.')">🔊</button>
  </div>
</div>

<!-- LEVEL 2 GAME -->
<div class="container">
  <h2>🎯 Level 2: Pehchano</h2>
  <p id="question">Hanuman ko dhoondo</p>

  <div class="game">
    <img src="https://i.imgur.com/3QZQZ9y.png" onclick="checkAnswer('ram')">
    <img src="https://i.imgur.com/2DhmtJ4.png" onclick="checkAnswer('hanuman')">
    <img src="https://i.imgur.com/5b6pX8L.png" onclick="checkAnswer('krishna')">
  </div>

  <p id="result"></p>
</div>

<!-- LEVEL 3 STORY -->
<div class="container">
  <h2>🎬 Level 3: Kahani</h2>

  <div class="card">
    <p id="storyText">Ram jungle mein ja rahe the...</p>
    <button onclick="nextStory()">➡️ Aage</button>
  </div>
</div>

<script>
// VOICE
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speech.rate = 0.8;
  window.speechSynthesis.speak(speech);
}

// LEVEL 2 GAME
function checkAnswer(ans) {
  let result = document.getElementById("result");

  if(ans === "hanuman") {
    result.innerHTML = "🎉 Sahi jawab!";
    speak("Bahut badhiya!");
  } else {
    result.innerHTML = "❌ Phir se koshish karo";
    speak("Dobara try karo");
  }
}

// LEVEL 3 STORY
let story = [
  "Ram jungle mein ja rahe the...",
  "Tab Hanuman unse mile...",
  "Dono acche dost ban gaye...",
  "Hanuman ne Ram ki madad ki..."
];

let index = 0;

function nextStory() {
  index++;
  if(index < story.length) {
    document.getElementById("storyText").innerText = story[index];
    speak(story[index]);
  } else {
    index = 0;
  }
}
</script>

</body>
</html>
