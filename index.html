<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Gurukul</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to bottom, #fff5e6, #ffe0b3);
}

h1 { color: #ff6600; }

.container { padding: 15px; }

img {
  width: 100px;
  margin: 10px;
  border-radius: 15px;
  cursor: pointer;
  transition: transform 0.2s;
}

img:active {
  transform: scale(1.2);
}

.glow {
  box-shadow: 0 0 20px gold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}

</style>
</head>

<body>

<h1>🪔 Little Gurukul</h1>
<h2>⭐ Stars: <span id="stars">0</span></h2>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<button onclick="startMusic()">▶️ Start Music</button>

<div class="container">
  <h3 id="question">Loading...</h3>
  <div class="grid" id="gameArea"></div>
</div>

<script>

let allCharacters = [
  {name: "ram", img: "https://i.imgur.com/3QZQZ9y.png"},
  {name: "hanuman", img: "https://i.imgur.com/2DhmtJ4.png"},
  {name: "krishna", img: "https://i.imgur.com/5b6pX8L.png"},
  {name: "shiva", img: "https://i.imgur.com/8RKXAIV.png"} // locked
];

let unlocked = 3;
let stars = 0;
let correctAnswer;

// MUSIC
function startMusic() {
  document.getElementById("bgMusic").play();
}

// VOICE
function speak(text) {
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speech.rate = 0.9;
  window.speechSynthesis.speak(speech);
}

// SHUFFLE
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// LOAD GAME
function loadGame() {
  let current = allCharacters.slice(0, unlocked);
  let shuffled = shuffle([...current]);

  let random = shuffled[Math.floor(Math.random()*shuffled.length)];
  correctAnswer = random.name;

  document.getElementById("question").innerText = random.name + " ko dhoondo";
  speak(random.name + " ko dhoondo");

  let html = "";
  shuffled.forEach(c => {
    html += `<img src="${c.img}" onclick="check('${c.name}', this)">`;
  });

  document.getElementById("gameArea").innerHTML = html;
}

// CHECK
function check(name, el) {
  if(name === correctAnswer) {
    stars++;
    document.getElementById("stars").innerText = stars;

    el.classList.add("glow");

    speak("Shabash!");

    // UNLOCK SYSTEM
    if(stars === 5 && unlocked < allCharacters.length) {
      unlocked++;
      speak("Naya character unlock hua!");
    }

    setTimeout(loadGame, 800);

  } else {
    speak("Dobara try karo");
  }
}

// INIT
loadGame();

</script>

</body>
</html>
